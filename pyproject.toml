# Tool configuration only – build system remains in setup.py for now.

# ---- Ruff ----------------------------------------------------------------

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["volatility_forecast"]

# ---- Mypy ----------------------------------------------------------------

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = false

# ---- Pytest --------------------------------------------------------------

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

# ---- Coverage ------------------------------------------------------------

[tool.coverage.run]
branch = true
source = ["volatility_forecast"]

[tool.coverage.report]
show_missing = true
skip_empty = true
